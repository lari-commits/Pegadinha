<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub | Premium</title>

<meta property="og:title" content="🎬 Acesso Premium Liberado">
<meta property="og:description" content="Netflix, Prime Video e Disney+ grátis hoje...">
<meta property="og:image" content="https://i.imgur.com/8Km9tLL.jpg">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Tela principal */
.container{
  text-align:center;
  max-width:400px;
}

.logo{
  color:#e50914;
  font-size:40px;
  font-weight:bold;
}

button{
  background:#e50914;
  border:none;
  padding:15px;
  width:100%;
  margin-top:20px;
  color:#fff;
  font-size:18px;
  border-radius:5px;
  cursor:pointer;
}

/* Tela hacker */
#hack{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#000;
  color:#0f0;
  padding:20px;
  font-family:monospace;
}

/* Screamer */
#susto{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:9999;
}
#susto img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Final */
#final{
  display:none;
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:#fff;
  color:#000;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<div class="container" id="main">
  <div class="logo">STREAMHUB</div>
  <h2>Acesso Premium</h2>
  <p>Você foi selecionado para acesso gratuito às plataformas:</p>
  <p><b>Netflix • Prime • Disney+</b></p>
  <button onclick="start()">ATIVAR ACESSO</button>
</div>

<div id="hack">
  <h2 style="color:red;">⚠️ INVASÃO DETECTADA</h2>
  <p id="log"></p>
</div>

<div id="susto">
  <img src="https://i.imgur.com/8Fk7C5c.jpg">
</div>

<div id="final">
  <h1>😂 1º DE ABRIL</h1>
  <p>Você caiu na pegadinha!</p>
  <button onclick="location.reload()">SAIR</button>
</div>

<script>

// Áudios (funcionam melhor)
let boom = new Audio("https://www.myinstants.com/media/sounds/vine-boom.mp3");
let scream = new Audio("https://www.myinstants.com/media/sounds/movie_1.mp3");

function start(){

  // garante que áudio funcione no mobile
  boom.play().catch(()=>{});

  document.getElementById("main").style.display="none";
  document.getElementById("hack").style.display="block";

  let logs = [
    "Conectando ao dispositivo...",
    "Acessando arquivos...",
    "Extraindo dados do WhatsApp...",
    "Enviando para servidor...",
    "Apagando sistema..."
  ];

  let i = 0;
  let logEl = document.getElementById("log");

  let intervalo = setInterval(()=>{
    logEl.innerHTML += logs[i] + "<br>";
    i++;

    if(i >= logs.length){
      clearInterval(intervalo);
      setTimeout(susto, 1000);
    }
  },1000);
}

function susto(){

  document.getElementById("hack").style.display="none";
  document.getElementById("susto").style.display="block";

  scream.play();

  if(navigator.vibrate){
    navigator.vibrate([500,200,500,200,800]);
  }

  setTimeout(()=>{
    document.getElementById("susto").style.display="none";
    document.getElementById("final").style.display="flex";
  },3000);
}

</script>

</body>
</html>
